[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=nginx -g 'daemon off;'
autostart=true
autorestart = unexpected
startretries = 3
stdout_logfile=/var/log/supervisor/nginx.log
stderr_logfile=/var/log/supervisor/nginx_error.log
priority=100

[program:runtime]
command=npm run start:runtime
directory=/voltage/apps/runtime
autostart=true
autorestart = unexpected
startretries = 3
stdout_logfile=/var/log/supervisor/runtime.log
stderr_logfile=/var/log/supervisor/runtime_error.log
priority=200

[program:api]
command=npm run start:api
directory=/voltage/apps/api
autostart=true
autorestart = unexpected
startretries = 3
stdout_logfile=/var/log/supervisor/api.log
stderr_logfile=/var/log/supervisor/api_error.log
priority=300

[program:frontend]
command=npm run start:frontend
directory=/voltage/apps/frontend
autostart=true
autorestart = unexpected
startretries = 3
stdout_logfile=/var/log/supervisor/frontend.log
stderr_logfile=/var/log/supervisor/frontend_error.log
priority=400