[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=/bin/bash -c "envsubst '\$APP_PORT \$VOLTAGE_API_PORT \$VOLTAGE_FRONTEND_PORT' < /etc/nginx/nginx.template.conf > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/nginx.log
stderr_logfile=/var/log/supervisor/nginx_error.log
priority=100

[program:runtime]
command=node /voltage/runtime/dist/index.js
directory=/voltage/runtime
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/runtime.log
stderr_logfile=/var/log/supervisor/runtime_error.log
priority=200

[program:api]
command=node /voltage/api/dist/index.js
directory=/voltage/api
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/api.log
stderr_logfile=/var/log/supervisor/api_error.log
priority=300

[program:frontend]
command=npx vite preview --host 0.0.0.0 --port \${VOLTAGE_FRONTEND_PORT}
directory=/voltage/frontend
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/frontend.log
stderr_logfile=/var/log/supervisor/frontend_error.log
priority=400