# docker-compose up -d --no-deps --build
# docker-compose stop

version: "3"
services:
    app:
        restart: always
        build:
            context: .
            dockerfile: .deploy/Dockerfile
        image: voltage:latest
        environment:
            - APP_ENV=prod
            - APP_PORT=${APP_PORT:-8080}
            - APP_BASE_URL=${APP_BASE_URL:""}
            - VOLTAGE_API_PORT=${VOLTAGE_API_PORT:-4000}
            - VOLTAGE_FRONTEND_PORT=${VOLTAGE_FRONTEND_PORT:-3000}
        ports:
            - "8080:8080"
